<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carro Aleatório</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button onclick="searchCar()">Buscar Carro</button>

<!-- INFORMAÇÕES BÁSICAS -->
<div class="informacaoBasica">
    <h3>Informações Básicas</h3>
    <p id="vinCar"></p>
</div>

<!-- MOTOR -->
<div class="motor">
    <h3>Motor</h3>
    <p id="motorCar"></p>
</div>

<!-- POTÊNCIA -->
<div class="potencia">
    <h3>Potência</h3>
    <p id="potenciaCar"></p>
</div>

<!-- COMBUSTÍVEL -->
<div class="combustivel">
    <h3>Combustível</h3>
    <p id="combustivelCar"></p>
</div>

<!-- FABRICANTE -->
<div class="fabricante">
    <h3>Fabricante</h3>
    <p id="fabricanteCar"></p>
</div>

<!-- IMAGEM -->
<div class="imagemCarro">
    <img id="carImage" src="" alt="Imagem do carro" width="400">
</div>

<script src="script.js"></script>

</body>
</html>
